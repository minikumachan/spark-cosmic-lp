- id: duration
  q: 制作期間はどのくらいかかりますか？
  a: 規模により異なりますが、LPで約3〜4週間、サイト構築で6〜10週間が目安です。お急ぎの場合は最短スケジュールもご相談ください。

- id: payment
  q: 料金の支払いタイミングは？
  a: 着手時に50%、納品時に50%を基本としています。プロジェクト規模に応じて分割でのお支払いもご相談いただけます。

- id: renewal
  q: 既存サイトのリニューアルも可能ですか？
  a: もちろん可能です。現状分析から課題の整理、改善設計、実装まで一貫して対応します。データに基づいて伸びしろを見つけます。

- id: maintenance
  q: 公開後の保守・運用はお願いできますか？
  a: 月額の保守プランをご用意しています。更新代行・改善提案・障害対応まで、公開後も継続的に伴走します。

- id: remote
  q: 遠方でも依頼できますか？
  a: 全国・海外どこからでもご依頼いただけます。オンラインMTGを基本に、必要に応じて訪問でも対応します。
